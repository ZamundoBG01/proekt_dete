<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. CORE - Архитект на симулации</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background-color: #0f172a; border-right: 1px solid #1e293b; height: 100vh; display: flex; flex-direction: column; }
        .main-chat { height: 100vh; display: flex; flex-direction: column; background-color: #0b1120; }
        .right-sidebar { background-color: #0f172a; border-left: 1px solid #1e293b; height: 100vh; overflow-y: auto; }
        
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message-user { background-color: #1e293b; color: #f8fafc; border-radius: 12px; padding: 12px 16px; align-self: flex-end; max-width: 80%; word-break: break-word; }
        .message-niki { background-color: #1e1b4b; color: #e0e7ff; border: 1px solid #312e81; border-radius: 12px; padding: 15px; align-self: flex-start; max-width: 90%; width: 100%; word-break: break-word; }
        
        .monologue-box { background-color: #0d1117; border-left: 3px solid #6366f1; padding: 10px 14px; margin-top: 10px; font-size: 0.85rem; color: #a5b4fc; border-radius: 4px; line-height: 1.4; }
        
        .ws-btn { text-align: left; background: transparent; color: #94a3b8; border: none; padding: 10px 15px; border-radius: 6px; width: 100%; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .ws-btn:hover { background-color: #1e293b; color: #f8fafc; }
        .ws-btn.active { background-color: #2563eb; color: #ffffff; font-weight: bold; }
        
        .card-custom { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; margin-bottom: 12px; }
        .del-btn { color: #ef4444; cursor: pointer; padding: 2px 6px; border-radius: 4px; display: none; }
        .ws-btn:hover .del-btn { display: inline-block; }
        .del-btn:hover { background-color: #451a1a; }
        
        /* По-голямо и удобно поле за писане */
        #user-input {
            min-height: 90px;
            max-height: 200px;
            resize: vertical;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container-fluid h-100">
    <div class="row h-100">
        <!-- ЛЯВ ПАНЕЛ (ПРОЕКТИ) -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="text-primary mb-4"><i class="fa-solid fa-brain me-2"></i>N.I.K.I. CORE</h5>
            <div class="small text-muted mb-2 text-uppercase font-monospace" style="font-size: 0.75rem;">Проекти (Workspaces)</div>
            <div id="workspaces-list" class="flex-grow-1 overflow-auto mb-3"></div>
            
            <button class="btn btn-outline-primary btn-sm w-100 mb-3" onclick="createNewWorkspace()">
                <i class="fa-solid fa-plus me-1"></i> Нов Проект
            </button>

            <div class="mt-auto border-top border-secondary pt-3">
                <input type="file" id="fileInput" class="d-none" onchange="uploadSelectedFile()">
                <button class="btn btn-sm btn-secondary w-100 mb-2" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-file-upload me-1"></i> Качи документ
                </button>
            </div>
        </div>

        <!-- ЦЕНТРАЛЕН ЧАТ -->
        <div class="col-md-7 main-chat p-0">
            <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center bg-dark bg-opacity-50">
                <div>
                    <span class="text-muted me-2">Активно пространство:</span>
                    <strong id="active-ws-title" class="text-info">GENERAL</strong>
                </div>
                <span class="badge bg-success font-monospace">ROOT Access Active</span>
            </div>

            <div id="chat-box" class="chat-box"></div>

            <div class="p-3 border-top border-secondary bg-dark bg-opacity-25">
                <div class="input-group">
                    <textarea id="user-input" class="form-control bg-dark text-light border-secondary p-3" placeholder="Въведете инструкция към N.I.K.I... (Enter за изпращане, Shift+Enter за нов ред)"></textarea>
                    <button class="btn btn-primary px-4 d-flex align-items-center justify-content-center" onclick="sendMessage()" id="send-btn">
                        <i class="fa-solid fa-paper-plane me-1"></i> Изпрати
                    </button>
                </div>
            </div>
        </div>

        <!-- ДЕСЕН ПАНЕЛ (ФАКТИ И ФАЙЛОВЕ) -->
        <div class="col-md-3 right-sidebar p-3">
            <h6 class="text-info mb-3"><i class="fa-solid fa-shield-halved me-2"></i>Пластове на доверие (Факти)</h6>
            <div id="facts-container"></div>

            <h6 class="text-warning mt-4 mb-3"><i class="fa-solid fa-folder-open me-2"></i>Файлове в библиотеката</h6>
            <div id="files-container"></div>
        </div>
    </div>
</div>

<script>
    let currentWorkspace = "general";

    function loadWorkspaces() {
        fetch("/workspaces")
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("workspaces-list");
                list.innerHTML = "";
                data.workspaces.forEach(ws => {
                    const btn = document.createElement("button");
                    btn.className = `ws-btn ${ws.toLowerCase() === currentWorkspace.toLowerCase() ? 'active' : ''}`;
                    
                    let delHtml = ws.toLowerCase() !== "general" ? `<span class="del-btn" onclick="deleteWorkspaceDirect(event, '${ws}')"><i class="fa-solid fa-trash-can"></i></span>` : '';
                    
                    btn.innerHTML = `<span><i class="fa-regular fa-folder me-2"></i>${ws.toUpperCase()}</span> ${delHtml}`;
                    btn.onclick = (e) => {
                        if (!e.target.closest('.del-btn')) {
                            switchWorkspace(ws);
                        }
                    };
                    list.appendChild(btn);
                });
            });
    }

    function switchWorkspace(ws) {
        currentWorkspace = ws.toLowerCase();
        document.getElementById("active-ws-title").innerText = ws.toUpperCase();
        document.getElementById("chat-box").innerHTML = "";

        loadWorkspaces();
        loadWorkspaceData(true); // Сменяме проекта и презареждаме чата
    }

    function loadWorkspaceData(reloadChat = false) {
        fetch(`/workspace_data/${currentWorkspace}`)
            .then(res => res.json())
            .then(data => {
                // Презареждаме чата само ако изрично превключваме проект
                if (reloadChat) {
                    const chatBox = document.getElementById("chat-box");
                    chatBox.innerHTML = "";
                    if (data.chat_history && data.chat_history.length > 0) {
                        data.chat_history.forEach(msg => {
                            appendMessageToBox(msg.sender, msg.message, msg.monologue);
                        });
                    } else {
                        chatBox.innerHTML = `<div class="text-center text-muted my-5"><i class="fa-regular fa-comments fa-2x mb-2"></i><br>Няма история на чата в този проект. Започнете разговор!</div>`;
                    }
                }

                // Зареждане на фактите вдясно
                const factsBox = document.getElementById("facts-container");
                factsBox.innerHTML = "";
                if (data.facts && data.facts.length > 0) {
                    data.facts.forEach(f => {
                        factsBox.innerHTML += `
                            <div class="card card-custom p-2">
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="badge bg-success">100% Доверие</span>
                                    <span class="badge bg-secondary">${f.category || 'ФАКТ'}</span>
                                </div>
                                <div class="small">${f.content}</div>
                            </div>
                        `;
                    });
                } else {
                    factsBox.innerHTML = `<div class="small text-muted">Няма записани факти.</div>`;
                }

                // Зареждане на файловете вдясно
                const filesBox = document.getElementById("files-container");
                filesBox.innerHTML = "";
                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        filesBox.innerHTML += `
                            <div class="d-flex justify-content-between align-items-center bg-dark p-2 rounded mb-1 border border-secondary">
                                <span class="small text-truncate me-2"><i class="fa-regular fa-file-lines me-1"></i>${file}</span>
                                <i class="fa-solid fa-xmark text-danger" style="cursor:pointer;" onclick="deleteFile('${file}')"></i>
                            </div>
                        `;
                    });
                } else {
                    filesBox.innerHTML = `<div class="small text-muted">Няма качени файлове.</div>`;
                }
            });
    }

    function appendMessageToBox(sender, text, monologue) {
        const chatBox = document.getElementById("chat-box");
        
        // Премахване на началното "Няма история" съобщение
        if (chatBox.innerText.includes("Няма история на чата")) {
            chatBox.innerHTML = "";
        }

        const msgDiv = document.createElement("div");
        if (sender === "user") {
            msgDiv.className = "message-user";
            msgDiv.innerText = text;
        } else {
            msgDiv.className = "message-niki";
            let mainText = marked.parse(text);
            let monologueHtml = "";
            if (monologue) {
                monologueHtml = `
                    <details class="mt-2">
                        <summary style="cursor:pointer; font-size: 0.82rem;" class="text-info fw-bold"><i class="fa-solid fa-brain me-1"></i> Виж вътрешен монолог / мисли</summary>
                        <div class="monologue-box">${monologue.replace(/\n/g, '<br>')}</div>
                    </details>
                `;
            }
            msgDiv.innerHTML = mainText + monologueHtml;
        }
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const msg = input.value.trim();
        if (!msg) return;

        appendMessageToBox("user", msg);
        input.value = "";
        input.style.height = "90px"; // Рестартираме височината на текстовото поле
        
        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-1"></i> Мисли...`;

        fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg, workspace: currentWorkspace })
        })
        .then(res => res.json())
        .then(data => {
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-paper-plane me-1"></i> Изпрати`;

            if (data.target_workspace && data.target_workspace !== currentWorkspace) {
                switchWorkspace(data.target_workspace);
            } else {
                appendMessageToBox("niki", data.reply, data.monologue);
                loadWorkspaceData(false); // Обновяваме само фактите вдясно, БЕЗ да пипаме чата!
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerHTML = `<i class="fa-solid fa-paper-plane me-1"></i> Изпрати`;
            appendMessageToBox("niki", "⚠️ Възникна грешка при връзката със сървъра.", null);
        });
    }

    function uploadSelectedFile() {
        const input = document.getElementById("fileInput");
        if (input.files.length === 0) return;

        const formData = new FormData();
        formData.append("file", input.files[0]);
        formData.append("workspace", currentWorkspace);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            input.value = "";
            loadWorkspaceData(false);
        });
    }

    function deleteFile(filename) {
        if (confirm(`Искате ли да изтриете файла '${filename}'?`)) {
            fetch("/delete_file", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ filename: filename, workspace: currentWorkspace })
            })
            .then(res => res.json())
            .then(data => {
                loadWorkspaceData(false);
            });
        }
    }

    function createNewWorkspace() {
        const name = prompt("Въведете име на новия проект:");
        if (name) {
            fetch("/workspaces", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name })
            })
            .then(res => res.json())
            .then(data => {
                switchWorkspace(data.workspace);
            });
        }
    }

    function deleteWorkspaceDirect(event, ws) {
        event.stopPropagation();
        if (confirm(`Сигурни ли сте, че искате да изтриете проект '${ws.toUpperCase()}' за постоянно?`)) {
            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: `изтрий ${ws}`, workspace: currentWorkspace })
            })
            .then(res => res.json())
            .then(data => {
                switchWorkspace("general");
            });
        }
    }

    document.getElementById("user-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    switchWorkspace("general");
</script>
</body>
</html>
