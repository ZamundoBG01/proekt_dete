<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. - Worldbuilding & Simulations</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --accent-red: #da3633;
            --user-msg-bg: #1f6feb;
            --bot-msg-bg: #21262d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 40px);
            transition: all 0.3s ease;
        }
        .container.fullscreen {
            grid-template-columns: 1fr 0px;
            gap: 0px;
        }
        .chat-section {
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            height: 100%;
            position: relative;
        }
        
        /* Drag Overlay за визуализация при влачене */
        .drag-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(31, 111, 235, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border: 3px dashed #ffffff;
            border-radius: 8px;
            pointer-events: none;
        }
        .chat-section.drag-over .drag-overlay {
            display: flex;
        }

        .chat-header {
            padding: 12px 20px;
            background-color: #21262d;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #f0f6fc;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-fullscreen {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--accent-blue);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn-fullscreen:hover {
            background-color: var(--border-color);
        }
        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
            position: relative;
        }
        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: #ffffff;
        }
        .message.niki {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border: 1px solid var(--border-color);
        }
        .message.thinking {
            align-self: flex-start;
            background-color: #161b22;
            border: 1px dashed var(--accent-blue);
            color: var(--accent-blue);
            font-style: italic;
        }
        .msg-timestamp {
            font-size: 0.72rem;
            margin-top: 6px;
            text-align: right;
            user-select: none;
            font-weight: 500;
        }
        .message.user .msg-timestamp {
            color: rgba(255, 255, 255, 0.85);
        }
        .message.niki .msg-timestamp {
            color: #8b949e;
        }
        .input-area {
            padding: 15px;
            background-color: #21262d;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        textarea {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            resize: none;
            height: 110px;
            max-height: 250px;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.4;
            box-sizing: border-box;
            overflow-y: auto;
        }
        textarea:focus {
            outline: 1px solid var(--accent-blue);
        }
        button {
            background-color: var(--accent-green);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-danger-small {
            background-color: var(--accent-red);
            color: #fff;
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            height: 32px;
            width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }
        .container.fullscreen .sidebar {
            display: none;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }
        .panel h3 {
            margin-top: 0;
            font-size: 1rem;
            color: #f0f6fc;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .ws-select-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        /* ДИРЕКТОРИИ И ФАЙЛОВЕ */
        .path-breadcrumbs {
            font-size: 0.8rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            word-break: break-all;
        }
        .file-item, .folder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        .folder-item {
            background-color: #1c2128;
            color: #f0f6fc;
            font-weight: 500;
        }
        .folder-item:hover {
            background-color: #2d333b;
        }
        .folder-name-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .file-item a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .file-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-icon {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.85rem;
        }
        .folder-controls {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        .dots::after {
            content: '';
            animation: dotsAnim 1.5s infinite;
        }
        @keyframes dotsAnim {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <!-- ЧАТ ЗОНА C DRAG & DROP -->
    <div class="chat-section" id="chat-section">
        <div class="drag-overlay">
            📁 Пусни файла тук за качване!
        </div>

        <div class="chat-header">
            <h2>N.I.K.I. - Worldbuilding & Simulations</h2>
            <div class="header-actions">
                <span id="current-ws-label" style="color: var(--accent-blue); font-weight: bold;">Проект: GENERAL</span>
                <button class="btn-fullscreen" onclick="toggleFullScreen()" title="Пълен екран">⛶</button>
            </div>
        </div>
        <div class="chat-history" id="chat-history"></div>
        <div class="input-area">
            <div class="v2-controls" style="display: flex; gap: 8px; margin-bottom: 5px; flex-wrap: wrap;">
                <button onclick="runCuriosityScan()" style="background-color: #21262d; border: 1px solid var(--border-color); padding: 6px 10px; font-size: 0.85rem;">🔍 Сканирай за пропуски</button>
                <button onclick="generateTaskPlan()" style="background-color: #21262d; border: 1px solid var(--border-color); padding: 6px 10px; font-size: 0.85rem;">🤖 План за задача</button>
                <button onclick="runSimulation()" style="background-color: #21262d; border: 1px solid var(--border-color); padding: 6px 10px; font-size: 0.85rem;">🧪 Симулация</button>
            </div>

            <textarea id="user-input" placeholder="Напиши инструкция тук... (Enter за изпращане, Shift+Enter за нов ред)" oninput="autoExpandTextarea(this)"></textarea>
            <div class="input-controls">
                <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--accent-blue);">
                    <input type="checkbox" id="auto-run-toggle"> 🔄 Автоматичен режим (Auto-Run 24/7)
                </label>
                <div style="flex:1;"></div>
                <button id="send-btn" onclick="sendMessage()">Изпрати</button>
            </div>
        </div>
    </div>

    <!-- СТРАНИЧЕН ПАНЕЛ -->
    <div class="sidebar">
        <div class="panel">
            <h3 style="cursor: default;">📁 Избор на Проект</h3>
            <div class="ws-select-row">
                <select id="ws-select" onchange="switchWorkspace()"></select>
                <button class="btn-danger-small" title="Изтрий текущия проект" onclick="deleteCurrentWorkspace()">🗑️</button>
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="new-ws-name" placeholder="Нов проект...">
                <button onclick="createWorkspace()" style="padding: 6px 12px;">+</button>
            </div>
        </div>

        <!-- ФАЙЛОВА СИСТЕМА С ПОДПАПКИ И DRAG & DROP -->
        <div class="panel" id="file-panel">
            <h3 style="cursor: default;">📚 Библиотека & Файлове</h3>
            
            <!-- Хлебни трохи (Breadcrumbs) за навигация -->
            <div class="path-breadcrumbs" id="path-breadcrumbs">
                <span id="path-text">Path: /</span>
                <button id="btn-up" onclick="navigateUp()" style="display:none; padding: 2px 6px; font-size: 0.75rem; background:#30363d; border:1px solid var(--border-color); color:#fff; border-radius:4px; cursor:pointer;">⬅️ Назад</button>
            </div>

            <div id="file-list" style="max-height: 200px; overflow-y: auto;"></div>

            <!-- Контроли за създаване на подпапка и качване -->
            <div class="folder-controls">
                <input type="text" id="new-folder-name" placeholder="Име на папка...">
                <button onclick="createFolder()" style="padding: 6px 10px; background-color: #21262d; border: 1px solid var(--border-color);">📁 +</button>
            </div>

            <div style="margin-top: 10px;">
                <input type="file" id="file-upload" style="display: none;" onchange="uploadFileFromInput()">
                <button onclick="document.getElementById('file-upload').click()" style="width: 100%; background-color: #21262d; border: 1px solid var(--border-color); padding: 8px;">📤 Качи файл</button>
            </div>
        </div>

        <div class="panel" style="flex: 1; overflow-y: auto;">
            <h3 onclick="toggleFactsSection()" title="Кликни за свиване/разгъване">
                📌 Факти в Базата Данни 
                <span id="facts-arrow" style="font-size: 0.8rem; color: var(--accent-blue);">▼</span>
            </h3>
            <div id="facts-container">
                <div id="facts-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let activeWorkspace = "general";
    let currentSubFolder = "";
    let factsExpanded = true;
    let thinkingTimer = null;
    let thinkingSeconds = 0;

    function toggleFullScreen() {
        document.getElementById("main-container").classList.toggle("fullscreen");
    }

    function autoExpandTextarea(el) {
        el.style.height = '110px';
        const newHeight = Math.max(110, Math.min(el.scrollHeight, 250));
        el.style.height = newHeight + 'px';
    }

    function getLocalTimeString(serverTimestamp) {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function loadWorkspaces() {
        try {
            const res = await fetch("/workspaces");
            const data = await res.json();
            const select = document.getElementById("ws-select");
            select.innerHTML = "";
            data.workspaces.forEach(ws => {
                const opt = document.createElement("option");
                opt.value = ws;
                opt.textContent = ws.toUpperCase();
                if(ws === activeWorkspace) opt.selected = true;
                select.appendChild(opt);
            });
            document.getElementById("current-ws-label").textContent = `Проект: ${activeWorkspace.toUpperCase()}`;
            loadWorkspaceData();
        } catch(e) {
            console.error("Грешка при зареждане на workspaces", e);
        }
    }

    async function loadWorkspaceData() {
        try {
            const res = await fetch(`/workspace_data/${activeWorkspace}?subfolder=${encodeURIComponent(currentSubFolder)}`);
            const data = await res.json();
            
            const chatContainer = document.getElementById("chat-history");
            const isUserAtBottom = (chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight) < 80;
            
            if (isUserAtBottom || chatContainer.children.length === 0) {
                chatContainer.innerHTML = "";
                data.chat_history.forEach(msg => {
                    appendMessageToUI(msg.sender, msg.message, msg.monologue, msg.timestamp, false);
                });
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // Обновяване на Хлебните трохи (Breadcrumbs)
            document.getElementById("path-text").textContent = `Path: /${currentSubFolder}`;
            document.getElementById("btn-up").style.display = currentSubFolder ? "inline-block" : "none";

            // Рендериране на Файлове и Папки
            const fileList = document.getElementById("file-list");
            fileList.innerHTML = "";

            // 1. Показване на папките
            if (data.folders && data.folders.length > 0) {
                data.folders.forEach(folder => {
                    fileList.innerHTML += `
                        <div class="folder-item">
                            <div class="folder-name-btn" onclick="enterFolder('${folder}')">
                                📁 <strong>${folder}</strong>
                            </div>
                            <button class="btn-icon" onclick="deleteFolder('${folder}')" title="Изтрий папката">❌</button>
                        </div>
                    `;
                });
            }

            // 2. Показване на файловете
            if (data.files && data.files.length > 0) {
                data.files.forEach(f => {
                    const filePath = currentSubFolder ? `${currentSubFolder}/${f}` : f;
                    fileList.innerHTML += `
                        <div class="file-item">
                            <span title="${f}">📄 ${f.length > 18 ? f.substring(0,15)+'...' : f}</span>
                            <div class="file-actions">
                                <a href="/download/${activeWorkspace}/${encodeURIComponent(filePath)}" target="_blank">[Свали]</a>
                                <button class="btn-icon" onclick="deleteFile('${f}')" title="Изтрий файла">❌</button>
                            </div>
                        </div>
                    `;
                });
            }

            if ((!data.folders || data.folders.length === 0) && (!data.files || data.files.length === 0)) {
                fileList.innerHTML = `<span style="color:#8b949e; font-size:0.85rem;">Папката е празна.</span>`;
            }

            // 3. Рендериране на Фактите
            const factsList = document.getElementById("facts-list");
            factsList.innerHTML = "";
            if (!data.facts || data.facts.length === 0) {
                factsList.innerHTML = `<span style="color:#8b949e; font-size:0.85rem;">Няма записани факти.</span>`;
            } else {
                data.facts.forEach(fact => {
                    factsList.innerHTML += `<div class="fact-item" style="font-size:0.85rem; padding:4px 0; border-bottom:1px solid #30363d; color:#8b949e;">• ${fact.content}</div>`;
                });
            }
        } catch(e) {
            console.error("Грешка при зареждане на данните за проект", e);
        }
    }

    /* НАВИГАЦИЯ В ПАПКИ */
    function enterFolder(folderName) {
        currentSubFolder = currentSubFolder ? `${currentSubFolder}/${folderName}` : folderName;
        loadWorkspaceData();
    }

    function navigateUp() {
        if (!currentSubFolder) return;
        const parts = currentSubFolder.split('/');
        parts.pop();
        currentSubFolder = parts.join('/');
        loadWorkspaceData();
    }

    async function createFolder() {
        const input = document.getElementById("new-folder-name");
        const folderName = input.value.trim();
        if (!folderName) return;

        await fetch("/create_folder", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ workspace: activeWorkspace, subfolder: currentSubFolder, folder_name: folderName })
        });
        input.value = "";
        loadWorkspaceData();
    }

    async function deleteFolder(folderName) {
        if (confirm(`Сигурни ли сте, че искате да изтриете папката "${folderName}" и цялото ѝ съдържание?`)) {
            await fetch("/delete_folder", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ workspace: activeWorkspace, subfolder: currentSubFolder, folder_name: folderName })
            });
            loadWorkspaceData();
        }
    }

    /* DRAG & DROP ПОДДРЪЖКА ЗА ЦЕЛИЯ ЕКРАН */
    const chatSection = document.getElementById("chat-section");

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        document.body.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        document.body.addEventListener(eventName, () => {
            chatSection.classList.add('drag-over');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        chatSection.addEventListener(eventName, (e) => {
            if (e.type === 'dragleave' && e.target !== document.body) return;
            chatSection.classList.remove('drag-over');
        }, false);
    });

    document.body.addEventListener('drop', (e) => {
        chatSection.classList.remove('drag-over');
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files && files.length > 0) {
            handleUploadedFiles(files);
        }
    });

    function uploadFileFromInput() {
        const fileInput = document.getElementById("file-upload");
        if (fileInput.files.length > 0) {
            handleUploadedFiles(fileInput.files);
        }
    }

    async function handleUploadedFiles(files) {
        for (let i = 0; i < files.length; i++) {
            const formData = new FormData();
            formData.append("file", files[i]);
            formData.append("workspace", activeWorkspace);
            formData.append("subfolder", currentSubFolder);

            await fetch("/upload", { method: "POST", body: formData });
        }
        loadWorkspaceData();
    }

    /* ДРУГИ ОПЕРАЦИИ В ЧАТА И БАЗАТА */
    function toggleFactsSection() {
        const container = document.getElementById("facts-container");
        const arrow = document.getElementById("facts-arrow");
        factsExpanded = !factsExpanded;
        container.style.display = factsExpanded ? "block" : "none";
        arrow.textContent = factsExpanded ? "▼" : "▲";
    }

    function appendMessageToUI(sender, text, monologue, timestamp, autoScroll = true) {
        const chatContainer = document.getElementById("chat-history");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender === 'user' ? 'user' : 'niki'}`;
        
        msgDiv.appendChild(document.createTextNode(text));

        const timeStr = getLocalTimeString(timestamp);
        const timeDiv = document.createElement("div");
        timeDiv.className = "msg-timestamp";
        timeDiv.textContent = timeStr;
        msgDiv.appendChild(timeDiv);

        chatContainer.appendChild(msgDiv);
        
        if (autoScroll) chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showThinkingIndicator() {
        const chatContainer = document.getElementById("chat-history");
        const thinkingDiv = document.createElement("div");
        thinkingDiv.id = "thinking-msg";
        thinkingDiv.className = "message thinking";
        
        thinkingSeconds = 0;
        thinkingDiv.innerHTML = `⚙️ N.I.K.I. генерира отговор<span class="dots"></span> (<span id="thinking-timer">0</span>s)`;
        
        chatContainer.appendChild(thinkingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        thinkingTimer = setInterval(() => {
            thinkingSeconds++;
            const timerEl = document.getElementById("thinking-timer");
            if (timerEl) timerEl.textContent = thinkingSeconds;
        }, 1000);
    }

    function removeThinkingIndicator() {
        if (thinkingTimer) clearInterval(thinkingTimer);
        const thinkingDiv = document.getElementById("thinking-msg");
        if (thinkingDiv) thinkingDiv.remove();
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const text = input.value.trim();
        const autoRun = document.getElementById("auto-run-toggle").checked;
        if (!text) return;
        
        appendMessageToUI("user", text);
        input.value = "";
        input.style.height = '110px';
        
        sendBtn.disabled = true;
        showThinkingIndicator();

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: text, workspace: activeWorkspace, auto_run: autoRun })
            });
            const data = await res.json();
            
            removeThinkingIndicator();
            sendBtn.disabled = false;

            if (data.target_workspace) {
                activeWorkspace = data.target_workspace;
                currentSubFolder = "";
                loadWorkspaces();
            } else {
                appendMessageToUI("niki", data.reply, data.monologue);
                loadWorkspaceData();
            }
        } catch (err) {
            removeThinkingIndicator();
            sendBtn.disabled = false;
            appendMessageToUI("niki", "❌ Възникна грешка при връзката със сървъра.");
        }
    }

    /* БУТОНИ ЗА N.I.K.I. V2.0 */
    function runCuriosityScan() {
        document.getElementById("user-input").value = "[СИСТЕМА]: Сканирай документацията за незавършени точки, неизвестни променливи или пропуски.";
        sendMessage();
    }

    function generateTaskPlan() {
        document.getElementById("user-input").value = "[СИСТЕМА]: Генерирай детайлен архитектурен план и стъпки за изпълнение за текущата задача.";
        sendMessage();
    }

    function runSimulation() {
        document.getElementById("user-input").value = "[СИСТЕМА]: Симулирай сценарий и тествай икономиката / механиката според наличните факти.";
        sendMessage();
    }

    async function switchWorkspace() {
        activeWorkspace = document.getElementById("ws-select").value;
        currentSubFolder = "";
        document.getElementById("current-ws-label").textContent = `Проект: ${activeWorkspace.toUpperCase()}`;
        loadWorkspaceData();
    }

    async function createWorkspace() {
        const input = document.getElementById("new-ws-name");
        const name = input.value.trim();
        if (!name) return;
        await fetch("/workspaces", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ name: name })
        });
        activeWorkspace = name;
        currentSubFolder = "";
        input.value = "";
        loadWorkspaces();
    }

    async function deleteCurrentWorkspace() {
        if (activeWorkspace === "general") {
            alert("Проектът GENERAL не може да бъде изтрит!");
            return;
        }
        if (confirm(`Сигурни ли сте, че искате да изтриете целия проект "${activeWorkspace.toUpperCase()}"?`)) {
            await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: `изтрий проект ${activeWorkspace}`, workspace: activeWorkspace })
            });
            activeWorkspace = "general";
            currentSubFolder = "";
            loadWorkspaces();
        }
    }

    async function deleteFile(filename) {
        if (confirm(`Сигурни ли сте, че искате да изтриете файла "${filename}"?`)) {
            await fetch("/delete_file", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ workspace: activeWorkspace, subfolder: currentSubFolder, filename: filename })
            });
            loadWorkspaceData();
        }
    }

    document.getElementById("user-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    setInterval(() => {
        loadWorkspaceData();
    }, 5000);

    loadWorkspaces();
</script>
</body>
</html>
