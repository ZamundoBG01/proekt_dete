<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. OS - Knowledge Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --monologue-bg: rgba(59, 130, 246, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header {
            background-color: var(--card-bg);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        .title { font-size: 1.2rem; font-weight: 700; color: #ffffff; }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); }

        .workspace-select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }

        .bubble { padding: 14px 18px; border-radius: 12px; font-size: 0.98rem; line-height: 1.5; white-space: pre-wrap; }
        .user .bubble { background-color: var(--accent-color); color: #ffffff; }
        .bot .bubble { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); }

        .timestamp { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; align-self: flex-end; }
        .monologue-box { background-color: var(--monologue-bg); border-left: 3px solid var(--accent-color); padding: 10px 14px; margin-bottom: 8px; border-radius: 6px; font-size: 0.85rem; color: #93c5fd; font-family: monospace; }

        .input-area { background-color: var(--card-bg); padding: 15px 25px; border-top: 1px solid var(--border-color); display: flex; gap: 12px; align-items: center; }
        .file-upload-btn { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .file-upload-btn:hover { color: var(--accent-color); border-color: var(--accent-color); }
        #file-input { display: none; }

        #message-input { flex: 1; background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 12px 18px; border-radius: 25px; color: var(--text-main); outline: none; }
        #message-input:focus { border-color: var(--accent-color); }

        .send-btn { background-color: var(--accent-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        #notification { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; background-color: #10b981; color: white; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="notification"></div>

    <header>
        <div class="logo-container">
            <div class="status-dot"></div>
            <div>
                <div class="title">N.I.K.I. OS</div>
                <div class="subtitle">Workspace-Aware Architecture (v5.0)</div>
            </div>
        </div>
        <div>
            <label style="font-size: 0.85rem; color: var(--text-muted); margin-right: 8px;">Workspace:</label>
            <select id="workspace-select" class="workspace-select">
                <option value="general">🌐 General (Общ)</option>
                <option value="martinala">🚀 Martinala Project</option>
                <option value="inventions">💡 Inventions (Изобретения)</option>
            </select>
        </div>
    </header>

    <div id="chat-container">
        <div class="message bot">
            <div class="bubble">Привет, Админ! N.I.K.I. OS (v5.0) е готов. Можеш да избираш активно работно пространство от горе вдясно.</div>
        </div>
    </div>

    <div class="input-area">
        <label for="file-input" class="file-upload-btn" title="Качи документ">
            <i class="fa-solid fa-paperclip"></i>
        </label>
        <input type="file" id="file-input" accept=".txt,.pdf,.docx" onchange="uploadFile()">

        <input type="text" id="message-input" placeholder="Задай въпрос..." onkeypress="handleKeyPress(event)">

        <button class="send-btn" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <script>
        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.innerText = msg;
            notif.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 4000);
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const wsSelect = document.getElementById('workspace-select');
            const message = input.value.trim();
            if (!message) return;

            const chatContainer = document.getElementById('chat-container');

            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerHTML = `<div class="bubble">${escapeHtml(message)}</div>`;
            chatContainer.appendChild(userDiv);

            input.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, workspace: wsSelect.value })
                });

                const data = await response.json();

                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                
                let monologueHtml = data.monologue ? `<div class="monologue-box"><i class="fa-solid fa-brain"></i> <b>Вътрешен монолог:</b><br>${escapeHtml(data.monologue)}</div>` : '';

                botDiv.innerHTML = `
                    ${monologueHtml}
                    <div class="bubble">${escapeHtml(data.reply)}</div>
                    <div class="timestamp">${data.time || ''}</div>
                `;

                chatContainer.appendChild(botDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (err) {
                showNotification('Грешка при комуникация.', true);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            const wsSelect = document.getElementById('workspace-select');
            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('workspace', wsSelect.value);

            showNotification('Качване на файл...');

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                showNotification(data.message, data.status !== 'success');
            } catch (err) {
                showNotification('Грешка при качване.', true);
            } finally {
                fileInput.value = '';
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
