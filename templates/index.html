<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. OS - Knowledge Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background-color: #1e293b; border-right: 1px solid #334155; min-height: 100vh; }
        .chat-container { height: calc(100vh - 120px); overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; max-width: 80%; }
        .message-user { margin-left: auto; background-color: #0284c7; color: white; border-radius: 18px 18px 2px 18px; padding: 12px 18px; }
        .message-niki { margin-right: auto; background-color: #334155; color: #f8fafc; border-radius: 18px 18px 18px 2px; padding: 12px 18px; }
        .monologue-box { background-color: #0f172a; border-left: 3px solid #f59e0b; color: #cbd5e1; font-size: 0.85rem; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .ws-btn { text-align: left; background: transparent; border: 1px solid #334155; color: #94a3b8; transition: all 0.2s; }
        .ws-btn.active, .ws-btn:hover { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .status-dot { width: 10px; height: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Ляво Странично Меню (Sidebar) -->
        <div class="col-md-3 col-lg-2 sidebar p-3">
            <div class="d-flex align-items-center gap-2 mb-4">
                <span class="status-dot"></span>
                <h5 class="m-0 fw-bold text-light">N.I.K.I. CORE</h5>
            </div>
            
            <h6 class="text-uppercase text-muted fs-7 fw-bold mb-3">Workspaces</h6>
            <div id="workspace-list" class="d-flex flex-column gap-2 mb-4">
                <!-- Динамично заредени пространства -->
            </div>

            <button class="btn btn-outline-primary btn-sm w-100 mb-4" onclick="createNewWorkspace()">
                <i class="bi bi-plus-lg"></i> Нов Workspace
            </button>

            <hr class="border-secondary">

            <div class="mb-3">
                <label class="form-label fs-7 text-muted">Качване на документ:</label>
                <input type="file" id="file-input" class="form-control form-control-sm bg-dark text-light border-secondary">
                <button class="btn btn-success btn-sm w-100 mt-2" onclick="uploadFile()">
                    <i class="bi bi-cloud-upload"></i> Синхронизирай
                </button>
            </div>
            <div id="upload-status" class="fs-7 text-info mt-2"></div>
        </div>

        <!-- Основна Зона за Чат -->
        <div class="col-md-9 col-lg-10 p-0 d-flex flex-column" style="height: 100vh;">
            <!-- Хедър -->
            <div class="p-3 bg-slate-800 border-bottom border-secondary d-flex justify-content-between align-items-center" style="background-color: #1e293b;">
                <div>
                    <span class="text-muted fs-7">Активно пространство:</span>
                    <strong id="current-ws-title" class="text-info ms-2">GENERAL</strong>
                </div>
                <div class="fs-7 text-muted">ROOT Access Active</div>
            </div>

            <!-- Чат Прозорец -->
            <div id="chat-box" class="chat-container flex-grow-1">
                <div class="text-center text-muted my-5">
                    <i class="bi bi-cpu fs-1"></i>
                    <p class="mt-2">N.I.K.I. Engine v9.0 е готов. Изберете команда или въпрос.</p>
                </div>
            </div>

            <!-- Форма за Изпращане -->
            <div class="p-3 border-top border-secondary" style="background-color: #1e293b;">
                <form id="chat-form" onsubmit="sendMessage(event)">
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control bg-dark text-light border-secondary p-3" placeholder="Задай въпрос, задача (задача:...) или факт (факт:...)..." required>
                        <button class="btn btn-primary px-4" type="submit">
                            <i class="bi bi-send-fill"></i> Изпрати
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    let currentWorkspace = "general";

    async function loadWorkspaces() {
        try {
            const res = await fetch("/workspaces");
            const data = await res.json();
            const listContainer = document.getElementById("workspace-list");
            listContainer.innerHTML = "";
            
            data.workspaces.forEach(ws => {
                const btn = document.createElement("button");
                btn.className = `btn ws-btn btn-sm ${ws === currentWorkspace ? 'active' : ''}`;
                btn.innerHTML = `<i class="bi bi-folder2-open me-2"></i> ${ws.toUpperCase()}`;
                btn.onclick = () => switchWorkspace(ws);
                listContainer.appendChild(btn);
            });
        } catch (e) { console.error("Грешка при зареждане на Workspaces:", e); }
    }

    function switchWorkspace(ws) {
        currentWorkspace = ws;
        document.getElementById("current-ws-title").innerText = ws.toUpperCase();
        loadWorkspaces();
        document.getElementById("chat-box").innerHTML = `<div class="text-center text-muted my-4">Преминахте в Workspace: <strong>${ws.toUpperCase()}</strong></div>`;
    }

    async function createNewWorkspace() {
        const name = prompt("Въведете име на новия Workspace:");
        if (!name) return;
        const res = await fetch("/workspaces", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (data.status === "success") {
            switchWorkspace(data.workspace);
        } else {
            alert(data.message);
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById("file-input");
        if (!fileInput.files[0]) return alert("Моля, изберете файл!");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("workspace", currentWorkspace);

        document.getElementById("upload-status").innerText = "Синхронизиране с GitHub...";

        try {
            const res = await fetch("/upload", { method: "POST", body: formData });
            const data = await res.json();
            document.getElementById("upload-status").innerText = data.message;
            fileInput.value = "";
        } catch (e) {
            document.getElementById("upload-status").innerText = "Грешка при качване.";
        }
    }

    async function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById("user-input");
        const msg = input.value.trim();
        if (!msg) return;

        const chatBox = document.getElementById("chat-box");

        // Показване съобщение на потребителя
        chatBox.innerHTML += `
            <div class="message message-user">
                <div>${msg}</div>
            </div>
        `;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg, workspace: currentWorkspace })
            });
            const data = await res.json();

            // Показване монолог (ако има) и отговор
            let monologueHTML = "";
            if (data.monologue) {
                monologueHTML = `
                    <details class="monologue-box mb-2">
                        <summary class="cursor-pointer text-warning fw-bold"><i class="bi bi-lightbulb"></i> Вътрешен монолог и логика</summary>
                        <div class="mt-2 text-wrap" style="white-space: pre-line;">${data.monologue}</div>
                    </details>
                `;
            }

            chatBox.innerHTML += `
                <div class="message message-niki">
                    ${monologueHTML}
                    <div style="white-space: pre-line;">${data.reply}</div>
                    <div class="fs-8 text-muted mt-1 text-end">${data.time}</div>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (e) {
            chatBox.innerHTML += `<div class="message message-niki text-danger">Грешка при комуникация със сървъра.</div>`;
        }
    }

    loadWorkspaces();
</script>
</body>
</html>
