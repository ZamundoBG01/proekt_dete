<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. - Worldbuilding & Simulation Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            gap: 20px;
            height: 100%;
        }

        .main-chat {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.user {
            align-self: flex-end;
            background: #0369a1;
            color: #fff;
        }

        .message.niki {
            align-self: flex-start;
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid var(--border-color);
        }

        .monologue-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            padding: 5px 0;
            font-size: 0.9em;
            text-decoration: underline;
            display: block;
            margin-top: 10px;
        }

        .monologue-content {
            display: none;
            background: rgba(15, 23, 42, 0.7);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.88em;
            color: #cbd5e1;
            margin-top: 6px;
            white-space: pre-wrap;
            border-left: 3px solid var(--accent-color);
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 90px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            line-height: 1.4;
        }

        textarea:focus {
            outline: 1px solid var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
            color: #fff;
        }

        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .workspace-select {
            width: 100%;
            padding: 8px;
            background: #1e293b;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.5);
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.88em;
        }

        .download-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        .autorun-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-chat">
        <div class="chat-header">
            <h2>N.I.K.I. - Worldbuilding & Simulations</h2>
            <span id="active-ws-title">Проект: GENERAL</span>
        </div>
        <div class="chat-messages" id="chat-messages">
        </div>
        <div class="input-area">
            <textarea id="user-input" spellcheck="true" placeholder="Опиши идея за свят, физика на планета или задай казус за симулация... (Enter за изпращане, Shift+Enter за нов ред)"></textarea>
            <div class="input-controls">
                <label class="autorun-toggle">
                    <input type="checkbox" id="autorun-check"> 🔄 Автоматичен режим (Auto-Run 24/7)
                </label>
                <button onclick="sendMessage()" style="margin-left: auto;">Изпрати (Enter)</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-box">
            <h3>📂 Избор на Проект</h3>
            <select id="workspace-select" class="workspace-select" onchange="switchWorkspace()">
            </select>
            <input type="text" id="new-ws-name" placeholder="Нов проект..." style="width:68%; padding:6px; font-size:14px;">
            <button onclick="createWorkspace()" style="padding:6px 12px;">+</button>
        </div>

        <div class="panel-box">
            <h3>📚 Библиотека & Документи (.docx)</h3>
            <input type="file" id="file-upload" style="display:none" onchange="uploadFile()">
            <button onclick="document.getElementById('file-upload').click()" style="width:100%; margin-bottom:12px; font-size:0.88em;">📤 Качи Файл</button>
            <div id="file-list"></div>
        </div>

        <div class="panel-box">
            <h3>🧠 Факти в Базата Данни</h3>
            <div id="facts-list" style="font-size: 0.88em;"></div>
        </div>
    </div>
</div>

<script>
    let currentWorkspace = "general";

    document.getElementById("user-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function loadWorkspaces() {
        const res = await fetch("/workspaces");
        const data = await res.json();
        const select = document.getElementById("workspace-select");
        select.innerHTML = "";
        data.workspaces.forEach(ws => {
            const opt = document.createElement("option");
            opt.value = ws;
            opt.innerText = ws.toUpperCase();
            if(ws === currentWorkspace) opt.selected = true;
            select.appendChild(opt);
        });
        loadWorkspaceData();
    }

    async function switchWorkspace() {
        currentWorkspace = document.getElementById("workspace-select").value;
        document.getElementById("active-ws-title").innerText = "Проект: " + currentWorkspace.toUpperCase();
        loadWorkspaceData();
    }

    async function createWorkspace() {
        const name = document.getElementById("new-ws-name").value.trim();
        if(!name) return;
        await fetch("/workspaces", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: name})
        });
        document.getElementById("new-ws-name").value = "";
        currentWorkspace = name.toLowerCase().replace(/\s+/g, '_');
        loadWorkspaces();
    }

    async function loadWorkspaceData() {
        const res = await fetch(`/workspace_data/${currentWorkspace}`);
        const data = await res.json();
        
        // Показване на чат историята
        const chatBox = document.getElementById("chat-messages");
        chatBox.innerHTML = "";
        data.chat_history.forEach(msg => {
            appendMessage(msg.sender, msg.message, msg.monologue);
        });

        // Показване на файловете за сваляне
        const fileList = document.getElementById("file-list");
        fileList.innerHTML = "";
        data.files.forEach(file => {
            fileList.innerHTML += `
                <div class="file-item">
                    <span>📄 ${file}</span>
                    <a href="/download/${currentWorkspace}/${file}" class="download-link" download>[Свали .docx]</a>
                </div>
            `;
        });

        // Факти
        const factsList = document.getElementById("facts-list");
        factsList.innerHTML = "";
        data.facts.forEach(f => {
            factsList.innerHTML += `<p style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:4px;">• ${f.content}</p>`;
        });
    }

    function appendMessage(sender, text, monologue) {
        const chatBox = document.getElementById("chat-messages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        
        let html = marked.parse(text);
        if(monologue) {
            const monoId = 'mono-' + Math.random().toString(36).substr(2, 9);
            html += `
                <button class="monologue-btn" onclick="toggleMono('${monoId}')">🔍 Виж вътрешен монолог / мисли</button>
                <div id="${monoId}" class="monologue-content">${monologue}</div>
            `;
        }
        
        msgDiv.innerHTML = html;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function toggleMono(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const msg = input.value.trim();
        const autoRun = document.getElementById("autorun-check").checked;
        if(!msg) return;

        appendMessage("user", msg);
        input.value = ""; // Изчистваме чак след като сме добавили съобщението в UI

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    message: msg,
                    workspace: currentWorkspace,
                    auto_run: autoRun
                })
            });

            const data = await res.json();
            appendMessage("niki", data.reply, data.monologue);
            loadWorkspaceData();
        } catch (err) {
            appendMessage("niki", "❌ Грешка при изпращане на съобщението. Опитайте отново.", err.toString());
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById("file-upload");
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("workspace", currentWorkspace);

        await fetch("/upload", {
            method: "POST",
            body: formData
        });

        fileInput.value = "";
        loadWorkspaceData();
    }

    loadWorkspaces();
</script>

</body>
</html>
