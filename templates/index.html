<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. (Neural Intelligent Knowledge Integrator)</title>
    <style>
        :root {
            --bg-color: #121824;
            --panel-bg: #1e2638;
            --accent-blue: #0084ff;
            --accent-green: #28a745;
            --accent-red: #dc3545;
            --text-main: #e1e6f0;
            --text-muted: #8c9ba5;
            --border-color: #2e3a52;
            --chat-user: #0d6efd;
            --chat-niki: #2b364e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ОСНОВЕН ЛЕЙАУТ */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .main-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            height: 100%;
        }

        .sidebar {
            width: 380px;
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            overflow-y: auto;
        }

        /* ШАПКА НА ЧАТА */
        .chat-header {
            padding: 15px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .project-badge {
            font-size: 0.85rem;
            background: rgba(0, 132, 255, 0.2);
            color: var(--accent-blue);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--accent-blue);
        }

        /* ЗОНА С СЪОБЩЕНИЯ */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message-row.user { align-self: flex-end; }
        .message-row.niki { align-self: flex-start; }

        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-row.user .bubble {
            background-color: var(--chat-user);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .message-row.niki .bubble {
            background-color: var(--chat-niki);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        .monologue-box {
            font-size: 0.8rem;
            color: #ffc107;
            background: rgba(255, 193, 7, 0.08);
            border-left: 3px solid #ffc107;
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 0 4px 4px 0;
            font-family: monospace;
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            align-self: flex-end;
        }

        /* ФУТЪР / ИНПУТ ЗОНА */
        .input-container {
            padding: 15px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .btn-quick {
            background: #2b364e;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-quick:hover {
            background: var(--accent-blue);
            color: white;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            resize: none;
            height: 50px;
            outline: none;
        }

        textarea:focus { border-color: var(--accent-blue); }

        .btn-send {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-send:hover { background: #218838; }

        .auto-run-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* СТРАНИЧЕН ПАНЕЛ */
        .sidebar-card {
            background: #182030;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-header {
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-danger { background: var(--accent-red); color: white; }
        .btn-success { background: var(--accent-green); color: white; }
        .btn-secondary { background: #4b5563; color: white; }
        .btn-sm:hover { opacity: 0.85; }

        .file-list, .fact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .item-actions { display: flex; gap: 4px; }
        .folder-item { color: #ffc107; cursor: pointer; font-weight: bold; }
        .file-item {
            color: var(--text-main);
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 150px;
        }

        .path-indicator {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ОСНОВЕН ЧАТ -->
    <div class="main-chat-area">
        <div class="chat-header">
            <h1>N.I.K.I. (Neural Intelligent Knowledge Integrator)</h1>
            <span class="project-badge" id="current-project-title">Проект: GENERAL</span>
        </div>

        <div class="messages-container" id="chat-messages">
            <!-- Съобщенията се зареждат тук -->
        </div>

        <div class="input-container">
            <div class="quick-actions">
                <button class="btn-quick" onclick="sendQuickPrompt('Сканирай за пропуски в логиката')">🔍 Сканирай за пропуски</button>
                <button class="btn-quick" onclick="sendQuickPrompt('Генерирай план за задача')">📋 План за задача</button>
                <button class="btn-quick" onclick="sendQuickPrompt('Симулирай развитие за следващите 10 години')">🚀 Симулация</button>
            </div>
            
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Напиши инструкция тук... (Enter за изпращане, Shift+Enter за нов ред)"></textarea>
                <button class="btn-send" id="send-btn" onclick="sendMessage()">Изпрати</button>
            </div>

            <div class="auto-run-toggle">
                <input type="checkbox" id="auto-run-check">
                <label for="auto-run-check">Автоматичен режим (Auto-Run 24/7)</label>
            </div>
        </div>
    </div>

    <!-- СТРАНИЧЕН ПАНЕЛ ЗА УПРАВЛЕНИЕ -->
    <div class="sidebar">
        <!-- КАРТА: ПРОЕКТИ -->
        <div class="sidebar-card">
            <div class="card-header">📁 Избор на Проект</div>
            <select id="workspace-select" class="form-control" onchange="switchWorkspace(this.value)">
                <option value="general">general</option>
            </select>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="new-workspace-input" class="form-control" placeholder="Нов проект...">
                <button class="btn-sm btn-success" onclick="createNewWorkspace()">+</button>
                <button class="btn-sm btn-danger" onclick="deleteCurrentWorkspace()" title="Изтрий проекта">🗑️</button>
            </div>
        </div>

        <!-- КАРТА: БИБЛИОТЕКА И ФАЙЛОВЕ -->
        <div class="sidebar-card">
            <div class="card-header">📚 Библиотека & Файлове</div>
            
            <div class="path-indicator">
                <span id="current-path-text">Path: /Root</span>
                <button class="btn-sm btn-secondary" id="btn-path-back" onclick="navigateFolderUp()" style="display:none;">⬅ Назад</button>
            </div>

            <!-- СЪЗДАВАНЕ НА ПАПКА -->
            <div style="display: flex; gap: 5px;">
                <input type="text" id="new-folder-input" class="form-control" placeholder="Име на папка...">
                <button class="btn-sm btn-primary" onclick="createNewFolder()" title="Създай папка">📁+</button>
            </div>

            <ul class="file-list" id="file-list-ul">
                <!-- Папки и файлове се генерират тук -->
            </ul>

            <!-- КАЧВАНЕ НА ФАЙЛ -->
            <form id="upload-form" style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
                <input type="file" id="file-input" class="form-control" style="font-size: 0.75rem;">
                <button type="button" class="btn-sm btn-primary" onclick="uploadSelectedFile()">☁️ Качи файл</button>
            </form>
        </div>

        <!-- КАРТА: ФАКТИ В DB -->
        <div class="sidebar-card">
            <div class="card-header">
                📌 Факти в Базата Данни
                <button class="btn-sm btn-danger" onclick="clearWorkspaceFacts()" title="Изчисти факти">🗑️</button>
            </div>
            <ul class="fact-list" id="fact-list-ul">
                <!-- Факти се зареждат тук -->
            </ul>
        </div>
    </div>
</div>

<script>
    let currentWorkspace = "general";
    let currentSubfolder = "";

    document.addEventListener("DOMContentLoaded", function() {
        loadWorkspaces();
        loadWorkspaceData(currentWorkspace);

        document.getElementById("message-input").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    });

    // --- УПРАВЛЕНИЕ НА ПРОЕКТИ ---
    function loadWorkspaces() {
        fetch('/workspaces')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById("workspace-select");
                select.innerHTML = "";
                data.workspaces.forEach(ws => {
                    const opt = document.createElement("option");
                    opt.value = ws;
                    opt.textContent = ws.toUpperCase();
                    if (ws === currentWorkspace) opt.selected = true;
                    select.appendChild(opt);
                });
            });
    }

    function switchWorkspace(wsName) {
        currentWorkspace = wsName;
        currentSubfolder = "";
        document.getElementById("current-project-title").textContent = "Проект: " + wsName.toUpperCase();
        loadWorkspaceData(currentWorkspace);
    }

    function createNewWorkspace() {
        const input = document.getElementById("new-workspace-input");
        const name = input.value.trim();
        if (!name) return;

        fetch('/workspaces', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name })
        })
        .then(res => res.json())
        .then(data => {
            input.value = "";
            loadWorkspaces();
            switchWorkspace(data.workspace);
        });
    }

    function deleteCurrentWorkspace() {
        if (currentWorkspace === "general") {
            alert("Проектът 'general' не може да бъде изтрит.");
            return;
        }
        if (!confirm(`Сигурни ли сте, че искате да изтриете проекта ${currentWorkspace.toUpperCase()}?`)) return;

        fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: `изтрий проект ${currentWorkspace}`, workspace: currentWorkspace })
        })
        .then(res => res.json())
        .then(data => {
            currentWorkspace = "general";
            loadWorkspaces();
            switchWorkspace("general");
        });
    }

    // --- ЗАРЕЖДАНЕ НА ДАННИ (ФАЙЛОВЕ, ПАПКИ, ФАКТИ, ЧАТ) ---
    function loadWorkspaceData(wsName, subfolder = "") {
        currentSubfolder = subfolder;
        document.getElementById("current-path-text").textContent = "Path: /" + (subfolder ? subfolder : "Root");
        document.getElementById("btn-path-back").style.display = subfolder ? "inline-block" : "none";

        fetch(`/workspace_data/${wsName}?subfolder=${encodeURIComponent(subfolder)}`)
            .then(res => res.json())
            .then(data => {
                renderChat(data.chat_history);
                renderFilesAndFolders(data.folders, data.files);
                renderFacts(data.facts);
            });
    }

    // --- УПРАВЛЕНИЕ НА ПАПКИ И ФАЙЛОВЕ ---
    function renderFilesAndFolders(folders, files) {
        const ul = document.getElementById("file-list-ul");
        ul.innerHTML = "";

        if (folders.length === 0 && files.length === 0) {
            ul.innerHTML = "<li style='font-size:0.8rem; color:var(--text-muted);'>Папката е празна.</li>";
            return;
        }

        // Папки
        folders.forEach(folder => {
            const li = document.createElement("li");
            li.className = "item-row";
            li.innerHTML = `
                <span class="folder-item" onclick="enterFolder('${folder}')">📁 /${folder}</span>
                <div class="item-actions">
                    <button class="btn-sm btn-danger" onclick="deleteFolder('${folder}')">🗑️</button>
                </div>
            `;
            ul.appendChild(li);
        });

        // Файлове
        files.forEach(file => {
            const li = document.createElement("li");
            li.className = "item-row";
            const downloadUrl = `/download/${currentWorkspace}/${currentSubfolder ? currentSubfolder + '/' : ''}${file}`;
            li.innerHTML = `
                <a href="${downloadUrl}" class="file-item" target="_blank" title="${file}">📄 ${file}</a>
                <div class="item-actions">
                    <button class="btn-sm btn-primary" onclick="moveFileModal('${file}')" title="Премести файл">🚚 Премести</button>
                    <button class="btn-sm btn-danger" onclick="deleteFile('${file}')" title="Изтрий файл">🗑️</button>
                </div>
            `;
            ul.appendChild(li);
        });
    }

    function createNewFolder() {
        const input = document.getElementById("new-folder-input");
        const folderName = input.value.trim();
        if (!folderName) return;

        fetch('/create_folder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                workspace: currentWorkspace,
                subfolder: currentSubfolder,
                folder_name: folderName
            })
        })
        .then(res => res.json())
        .then(data => {
            input.value = "";
            loadWorkspaceData(currentWorkspace, currentSubfolder);
        });
    }

    function enterFolder(folderName) {
        const newPath = currentSubfolder ? `${currentSubfolder}/${folderName}` : folderName;
        loadWorkspaceData(currentWorkspace, newPath);
    }

    function navigateFolderUp() {
        if (!currentSubfolder) return;
        const parts = currentSubfolder.split('/');
        parts.pop();
        loadWorkspaceData(currentWorkspace, parts.join('/'));
    }

    function deleteFolder(folderName) {
        if (!confirm(`Изтриване на папка '${folderName}' и съдържанието ѝ?`)) return;

        fetch('/delete_folder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                workspace: currentWorkspace,
                subfolder: currentSubfolder,
                folder_name: folderName
            })
        })
        .then(res => res.json())
        .then(data => {
            loadWorkspaceData(currentWorkspace, currentSubfolder);
        });
    }

    // --- ПРЕМЕСТВАНЕ НА ФАЙЛ (МОДАЛЕН БУТОН) ---
    function moveFileModal(filename) {
        let targetFolder = prompt(`В коя папка да преместя "${filename}"?\n\n(Остави празно за коренната папка /Root, или въведи име на папка, напр: OLD):`, "OLD");
        
        if (targetFolder === null) return; // Отказано от потребителя

        fetch('/move_file', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                workspace: currentWorkspace,
                filename: filename,
                source_subfolder: currentSubfolder,
                target_subfolder: targetFolder.trim()
            })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadWorkspaceData(currentWorkspace, currentSubfolder);
        })
        .catch(err => alert("Грешка при преместване: " + err));
    }

    function deleteFile(filename) {
        if (!confirm(`Сигурни ли сте, че искате да изтриете файла '${filename}'?`)) return;

        fetch('/delete_file', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                workspace: currentWorkspace,
                subfolder: currentSubfolder,
                filename: filename
            })
        })
        .then(res => res.json())
        .then(data => {
            loadWorkspaceData(currentWorkspace, currentSubfolder);
        });
    }

    function uploadSelectedFile() {
        const fileInput = document.getElementById("file-input");
        if (!fileInput.files[0]) {
            alert("Моля, изберете файл.");
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("workspace", currentWorkspace);
        formData.append("subfolder", currentSubfolder);

        fetch('/upload', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            fileInput.value = "";
            loadWorkspaceData(currentWorkspace, currentSubfolder);
        });
    }

    // --- ФАКТИ ---
    function renderFacts(facts) {
        const ul = document.getElementById("fact-list-ul");
        ul.innerHTML = "";
        if (!facts || facts.length === 0) {
            ul.innerHTML = "<li style='font-size:0.8rem; color:var(--text-muted);'>Няма записани факти.</li>";
            return;
        }
        facts.forEach(f => {
            const li = document.createElement("li");
            li.className = "item-row";
            li.innerHTML = `<span style="font-size:0.8rem;">📌 ${f.content}</span>`;
            ul.appendChild(li);
        });
    }

    function clearWorkspaceFacts() {
        if (!confirm("Изчистване на всички факти и история за този проект?")) return;
        fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: "изтрий всичко", workspace: currentWorkspace })
        })
        .then(res => res.json())
        .then(() => loadWorkspaceData(currentWorkspace, currentSubfolder));
    }

    // --- ЧАТ ФУНКЦИОНАЛНОСТ ---
    function renderChat(history) {
        const container = document.getElementById("chat-messages");
        container.innerHTML = "";
        if (!history) return;

        history.forEach(msg => {
            const row = document.createElement("div");
            row.className = `message-row ${msg.sender}`;

            let html = "";
            if (msg.monologue) {
                html += `<div class="monologue-box">${msg.monologue}</div>`;
            }
            html += `<div class="bubble">${escapeHtml(msg.message)}</div>`;
            html += `<div class="timestamp">${msg.timestamp || ''}</div>`;

            row.innerHTML = html;
            container.appendChild(row);
        });
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("message-input");
        const msg = input.value.trim();
        if (!msg) return;

        const autoRun = document.getElementById("auto-run-check").checked;
        input.value = "";

        fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                message: msg,
                workspace: currentWorkspace,
                auto_run: autoRun
            })
        })
        .then(res => res.json())
        .then(data => {
            loadWorkspaceData(currentWorkspace, currentSubfolder);
        });
    }

    function sendQuickPrompt(promptText) {
        document.getElementById("message-input").value = promptText;
        sendMessage();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
