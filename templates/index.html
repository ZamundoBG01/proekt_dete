<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. - Worldbuilding & Simulations</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.8);
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1500px;
            gap: 15px;
            height: 100%;
        }

        .main-chat {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 88%;
            padding: 12px 18px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0369a1;
            color: #fff;
        }

        .message.niki {
            align-self: flex-start;
            background: rgba(51, 65, 85, 0.85);
            border: 1px solid var(--border-color);
        }

        .monologue-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            padding: 5px 0;
            font-size: 0.9em;
            text-decoration: underline;
            display: block;
            margin-top: 8px;
        }

        .monologue-content {
            display: none;
            background: rgba(15, 23, 42, 0.8);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.88em;
            color: #cbd5e1;
            margin-top: 6px;
            white-space: pre-wrap;
            border-left: 3px solid var(--accent-color);
        }

        .input-area {
            padding: 12px 15px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            padding: 10px 12px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        textarea:focus {
            outline: 1px solid var(--accent-color);
        }

        button.send-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }

        button.send-btn:hover {
            background: var(--accent-hover);
            color: #fff;
        }

        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 320px;
        }

        .panel-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 15px;
            flex: 1;
            overflow-y: auto;
        }

        .workspace-select {
            width: 100%;
            padding: 8px;
            background: #1e293b;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.88em;
        }

        .download-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        .autorun-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: var(--accent-color);
            cursor: pointer;
        }

        .expand-facts-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            padding: 4px 0;
            font-size: 0.85em;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-chat">
        <div class="chat-header">
            <h2 style="margin:0; font-size:18px;">N.I.K.I. - Worldbuilding & Simulations</h2>
            <span id="active-ws-title" style="color:var(--accent-color); font-weight:bold;">Проект: GENERAL</span>
        </div>
        <div class="chat-messages" id="chat-messages">
        </div>
        <div class="input-area">
            <textarea id="user-input" spellcheck="true" placeholder="Напиши инструкция тук... (Enter за изпращане, Shift+Enter за нов ред)"></textarea>
            <div class="input-controls">
                <label class="autorun-toggle">
                    <input type="checkbox" id="autorun-check"> 🔄 Автоматичен режим (Auto-Run 24/7)
                </label>
                <button class="send-btn" onclick="sendMessage()">Изпрати</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="panel-box">
            <h3 style="margin-top:0; font-size:15px;">📂 Избор на Проект</h3>
            <select id="workspace-select" class="workspace-select" onchange="switchWorkspace()">
            </select>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-ws-name" placeholder="Нов проект..." style="flex:1; padding:6px; background:#1e293b; color:#fff; border:1px solid var(--border-color); border-radius:4px;">
                <button onclick="createWorkspace()" style="padding:6px 12px; background:var(--accent-color); border:none; border-radius:4px; font-weight:bold; cursor:pointer;">+</button>
            </div>
        </div>

        <div class="panel-box">
            <h3 style="margin-top:0; font-size:15px;">📚 Библиотека & Документи (.docx)</h3>
            <div id="file-list"></div>
        </div>

        <div class="panel-box">
            <h3 style="margin-top:0; font-size:15px;">🧠 Факти в Базата Данни</h3>
            <div id="facts-container" style="font-size: 0.88em;"></div>
        </div>
    </div>
</div>

<script>
    let currentWorkspace = "general";

    document.getElementById("user-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function loadWorkspaces() {
        try {
            const res = await fetch("/workspaces");
            const data = await res.json();
            const select = document.getElementById("workspace-select");
            select.innerHTML = "";
            data.workspaces.forEach(ws => {
                const opt = document.createElement("option");
                opt.value = ws;
                opt.innerText = ws.toUpperCase();
                if(ws === currentWorkspace) opt.selected = true;
                select.appendChild(opt);
            });
            loadWorkspaceData();
        } catch(e) { console.error("Workspaces load error:", e); }
    }

    async function switchWorkspace() {
        currentWorkspace = document.getElementById("workspace-select").value;
        document.getElementById("active-ws-title").innerText = "Проект: " + currentWorkspace.toUpperCase();
        loadWorkspaceData();
    }

    async function createWorkspace() {
        const name = document.getElementById("new-ws-name").value.trim();
        if(!name) return;
        await fetch("/workspaces", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: name})
        });
        document.getElementById("new-ws-name").value = "";
        currentWorkspace = name.toLowerCase().replace(/\s+/g, '_');
        loadWorkspaces();
    }

    async function loadWorkspaceData() {
        try {
            const res = await fetch(`/workspace_data/${currentWorkspace}`);
            const data = await res.json();
            
            // Чат история
            const chatBox = document.getElementById("chat-messages");
            chatBox.innerHTML = "";
            data.chat_history.forEach(msg => {
                appendMessage(msg.sender, msg.message, msg.monologue);
            });

            // Файлове
            const fileList = document.getElementById("file-list");
            fileList.innerHTML = "";
            data.files.forEach(file => {
                fileList.innerHTML += `
                    <div class="file-item">
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;">📄 ${file}</span>
                        <a href="/download/${currentWorkspace}/${file}" class="download-link" download>[Свали]</a>
                    </div>
                `;
            });

            // Компактни Факти (Показваме само последния + [+] бутон за останалите)
            const factsContainer = document.getElementById("facts-container");
            factsContainer.innerHTML = "";
            
            if (data.facts.length === 0) {
                factsContainer.innerHTML = "<p style='color:#94a3b8;'>Няма записани факти.</p>";
            } else {
                const latest = data.facts[0];
                let html = `<p style="margin:0 0 6px 0; font-weight:bold; color:#e2e8f0;">📌 Последен факт:</p>`;
                html += `<p style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:4px; margin:0 0 8px 0;">• ${latest.content}</p>`;

                if (data.facts.length > 1) {
                    html += `<button class="expand-facts-btn" onclick="toggleFacts()">[+] Виж всички факти (${data.facts.length})</button>`;
                    html += `<div id="all-facts-list" style="display:none; margin-top:8px;">`;
                    for (let i = 1; i < data.facts.length; i++) {
                        html += `<p style="border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:4px; margin:4px 0; color:#cbd5e1;">• ${data.facts[i].content}</p>`;
                    }
                    html += `</div>`;
                }
                factsContainer.innerHTML = html;
            }

        } catch(e) { console.error("Workspace data error:", e); }
    }

    function toggleFacts() {
        const el = document.getElementById("all-facts-list");
        if (el) {
            el.style.display = el.style.display === "block" ? "none" : "block";
        }
    }

    function appendMessage(sender, text, monologue) {
        const chatBox = document.getElementById("chat-messages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        
        let html = marked.parse(text);
        if(monologue) {
            const monoId = 'mono-' + Math.random().toString(36).substr(2, 9);
            html += `
                <button class="monologue-btn" onclick="toggleMono('${monoId}')">🔍 Виж вътрешен монолог / мисли</button>
                <div id="${monoId}" class="monologue-content">${monologue}</div>
            `;
        }
        
        msgDiv.innerHTML = html;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function toggleMono(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const msg = input.value.trim();
        const autoRun = document.getElementById("autorun-check").checked;
        if(!msg) return;

        appendMessage("user", msg);
        input.value = "";

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    message: msg,
                    workspace: currentWorkspace,
                    auto_run: autoRun
                })
            });

            const data = await res.json();
            appendMessage("niki", data.reply, data.monologue);
            
            // Презареждаме само списъка с файлове и фактите, БЕЗ да чистим чата!
            loadWorkspaceData();
        } catch (err) {
            appendMessage("niki", "❌ Грешка при изпращане на съобщението.", err.toString());
        }
    }

    loadWorkspaces();
</script>

</body>
</html>
