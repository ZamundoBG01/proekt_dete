<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. - Worldbuilding & Simulations</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --accent-red: #da3633;
            --user-msg-bg: #1f6feb;
            --bot-msg-bg: #21262d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 40px);
        }
        .chat-section {
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px 20px;
            background-color: #21262d;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #f0f6fc;
        }
        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
            white-space: pre-wrap;
            position: relative;
        }
        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: #ffffff;
        }
        .message.niki {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border: 1px solid var(--border-color);
        }
        .msg-timestamp {
            font-size: 0.7rem;
            color: #8b949e;
            margin-top: 4px;
            text-align: right;
            user-select: none;
        }
        .thought-box {
            margin-top: 10px;
            padding: 10px;
            background-color: #0d1117;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .thought-toggle {
            cursor: pointer;
            color: var(--accent-blue);
            font-size: 0.85rem;
            margin-top: 5px;
            display: inline-block;
        }
        .input-area {
            padding: 15px;
            background-color: #21262d;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        textarea {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            resize: none;
            height: 50px;
            font-family: inherit;
        }
        button {
            background-color: var(--accent-green);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-danger-small {
            background-color: var(--accent-red);
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }
        .panel h3 {
            margin-top: 0;
            font-size: 1rem;
            color: #f0f6fc;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .ws-select-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }
        .file-item a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .file-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-icon {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.85rem;
        }
        .btn-icon:hover { opacity: 0.8; }
        .fact-item {
            font-size: 0.85rem;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
            color: #8b949e;
        }
        .auto-run-check {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="chat-section">
        <div class="chat-header">
            <h2>N.I.K.I. - Worldbuilding & Simulations</h2>
            <span id="current-ws-label" style="color: var(--accent-blue); font-weight: bold;">Проект: GENERAL</span>
        </div>
        <div class="chat-history" id="chat-history"></div>
        <div class="input-area">
            <textarea id="user-input" placeholder="Напиши инструкция тук... (Enter за изпращане, Shift+Enter за нов ред)"></textarea>
            <div class="input-controls">
                <label class="auto-run-check">
                    <input type="checkbox" id="auto-run-toggle"> 🔄 Автоматичен режим (Auto-Run 24/7)
                </label>
                <div style="flex:1;"></div>
                <button onclick="sendMessage()">Изпрати</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h3 style="cursor: default;">📁 Избор на Проект</h3>
            <div class="ws-select-row">
                <select id="ws-select" onchange="switchWorkspace()"></select>
                <button class="btn-danger-small" title="Изтрий текущия проект" onclick="deleteCurrentWorkspace()">🗑️</button>
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="new-ws-name" placeholder="Нов проект...">
                <button onclick="createWorkspace()" style="padding: 6px 12px;">+</button>
            </div>
        </div>

        <div class="panel">
            <h3 style="cursor: default;">📚 Библиотека & Документи (.docx)</h3>
            <div id="file-list"></div>
            <div style="margin-top: 10px;">
                <input type="file" id="file-upload" style="display: none;" onchange="uploadFile()">
                <button onclick="document.getElementById('file-upload').click()" style="width: 100%; background-color: #21262d; border: 1px solid var(--border-color); padding: 8px;">📤 Качи файл</button>
            </div>
        </div>

        <div class="panel" style="flex: 1; overflow-y: auto;">
            <h3 onclick="toggleFactsSection()" title="Кликни за свиване/разгъване">
                📌 Факти в Базата Данни 
                <span id="facts-arrow" style="font-size: 0.8rem; color: var(--accent-blue);">▼</span>
            </h3>
            <div id="facts-container">
                <div id="facts-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let activeWorkspace = "general";
    let factsExpanded = true;

    async function loadWorkspaces() {
        const res = await fetch("/workspaces");
        const data = await res.json();
        const select = document.getElementById("ws-select");
        select.innerHTML = "";
        data.workspaces.forEach(ws => {
            const opt = document.createElement("option");
            opt.value = ws;
            opt.textContent = ws.toUpperCase();
            if(ws === activeWorkspace) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById("current-ws-label").textContent = `Проект: ${activeWorkspace.toUpperCase()}`;
        loadWorkspaceData();
    }

    async function loadWorkspaceData() {
        const res = await fetch(`/workspace_data/${activeWorkspace}`);
        const data = await res.json();
        
        const chatContainer = document.getElementById("chat-history");
        chatContainer.innerHTML = "";
        data.chat_history.forEach(msg => {
            appendMessageToUI(msg.sender, msg.message, msg.monologue, msg.timestamp);
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;

        const fileList = document.getElementById("file-list");
        fileList.innerHTML = "";
        if (data.files.length === 0) {
            fileList.innerHTML = `<span style="color:#8b949e; font-size:0.85rem;">Няма налични файлове.</span>`;
        } else {
            data.files.forEach(f => {
                fileList.innerHTML += `
                    <div class="file-item">
                        <span title="${f}">${f.length > 16 ? f.substring(0,13)+'...' : f}</span>
                        <div class="file-actions">
                            <a href="/download/${activeWorkspace}/${encodeURIComponent(f)}" target="_blank">[Свали]</a>
                            <button class="btn-icon" onclick="deleteFile('${f}')" title="Изтрий файла">❌</button>
                        </div>
                    </div>
                `;
            });
        }

        const factsList = document.getElementById("facts-list");
        factsList.innerHTML = "";
        if (data.facts.length === 0) {
            factsList.innerHTML = `<span style="color:#8b949e; font-size:0.85rem;">Няма записани факти.</span>`;
        } else {
            data.facts.forEach(fact => {
                factsList.innerHTML += `<div class="fact-item">• ${fact.content}</div>`;
            });
        }
    }

    function toggleFactsSection() {
        const container = document.getElementById("facts-container");
        const arrow = document.getElementById("facts-arrow");
        factsExpanded = !factsExpanded;
        container.style.display = factsExpanded ? "block" : "none";
        arrow.textContent = factsExpanded ? "▼" : "▲";
    }

    function appendMessageToUI(sender, text, monologue, timestamp) {
        const chatContainer = document.getElementById("chat-history");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender === 'user' ? 'user' : 'niki'}`;
        
        const textNode = document.createTextNode(text);
        msgDiv.appendChild(textNode);

        if (monologue && sender !== 'user') {
            const toggle = document.createElement("div");
            toggle.className = "thought-toggle";
            toggle.textContent = "🔍 Виж вътрешен монолог / мисли";
            
            const thoughtBox = document.createElement("div");
            thoughtBox.className = "thought-box";
            thoughtBox.style.display = "none";
            thoughtBox.textContent = monologue;
            toggle.onclick = () => {
                thoughtBox.style.display = thoughtBox.style.display === "none" ? "block" : "none";
            };
            msgDiv.appendChild(document.createElement("br"));
            msgDiv.appendChild(toggle);
            msgDiv.appendChild(thoughtBox);
        }

        const timeStr = timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const timeDiv = document.createElement("div");
        timeDiv.className = "msg-timestamp";
        timeDiv.textContent = timeStr;
        msgDiv.appendChild(timeDiv);

        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const text = input.value.trim();
        const autoRun = document.getElementById("auto-run-toggle").checked;
        if (!text) return;
        appendMessageToUI("user", text);
        input.value = "";
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text, workspace: activeWorkspace, auto_run: autoRun })
        });
        const data = await res.json();
        
        if (data.target_workspace) {
            activeWorkspace = data.target_workspace;
            loadWorkspaces();
        } else {
            appendMessageToUI("niki", data.reply, data.monologue);
            loadWorkspaceData();
        }
    }

    async function switchWorkspace() {
        activeWorkspace = document.getElementById("ws-select").value;
        document.getElementById("current-ws-label").textContent = `Проект: ${activeWorkspace.toUpperCase()}`;
        loadWorkspaceData();
    }

    async function createWorkspace() {
        const input = document.getElementById("new-ws-name");
        const name = input.value.trim();
        if (!name) return;
        await fetch("/workspaces", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ name: name })
        });
        activeWorkspace = name;
        input.value = "";
        loadWorkspaces();
    }

    async function deleteCurrentWorkspace() {
        if (activeWorkspace === "general") {
            alert("Проектът GENERAL не може да бъде изтрит!");
            return;
        }
        if (confirm(`Сигурни ли сте, че искате да изтриете целия проект "${activeWorkspace.toUpperCase()}"?`)) {
            await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: `изтрий проект ${activeWorkspace}`, workspace: activeWorkspace })
            });
            activeWorkspace = "general";
            loadWorkspaces();
        }
    }

    async function deleteFile(filename) {
        if (confirm(`Сигурни ли сте, че искате да изтриете файла "${filename}"?`)) {
            await fetch("/delete_file", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ workspace: activeWorkspace, filename: filename })
            });
            loadWorkspaceData();
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById("file-upload");
        if (fileInput.files.length === 0) return;
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("workspace", activeWorkspace);
        await fetch("/upload", { method: "POST", body: formData });
        fileInput.value = "";
        loadWorkspaceData();
    }

    document.getElementById("user-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Автоматично обновяване на всеки 5 секунди
    setInterval(() => {
        loadWorkspaceData();
    }, 5000);

    loadWorkspaces();
</script>
</body>
</html>
