<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. CORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b132b; color: #e0e1dd; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .app-container { display: flex; height: 100vh; }
        
        .sidebar-left { width: 260px; background-color: #1c2541; padding: 20px; border-right: 1px solid #3a506b; display: flex; flex-direction: column; }
        .sidebar-right { width: 320px; background-color: #1c2541; padding: 20px; border-left: 1px solid #3a506b; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background-color: #0b132b; }
        
        .brand-header { font-weight: bold; font-size: 1.2rem; color: #4cc9f0; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .ws-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .ws-item { padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: #0b132b; color: #a5a5a5; transition: all 0.2s; font-weight: 500; }
        .ws-item:hover, .ws-item.active { background: #4361ee; color: #ffffff; }
        
        .chat-header { padding: 15px 20px; background: #1c2541; border-bottom: 1px solid #3a506b; display: flex; justify-content: space-between; align-items: center; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .user-msg { background: #4361ee; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #1c2541; color: #e0e1dd; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #3a506b; }
        
        .thought-container { margin-bottom: 10px; border: 1px solid #3a506b; border-radius: 8px; background: #0b132b; overflow: hidden; }
        .thought-summary { padding: 8px 12px; background: #131b2e; color: #4cc9f0; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .thought-content { padding: 12px; font-size: 0.85rem; color: #a5b4fc; white-space: pre-wrap; font-family: monospace; border-top: 1px solid #3a506b; }

        .panel-card { background: #0b132b; border: 1px solid #3a506b; border-radius: 8px; padding: 12px; }
        .panel-title { font-size: 0.85rem; font-weight: bold; color: #4cc9f0; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .panel-list { font-size: 0.8rem; color: #c7d2fe; margin: 0; padding-left: 0; list-style: none; }

        .chat-input-area { padding: 15px; background: #1c2541; border-top: 1px solid #3a506b; display: flex; gap: 10px; }
        .chat-input { background: #0b132b; border: 1px solid #3a506b; color: white; border-radius: 8px; padding: 10px; flex: 1; }
        .chat-input:focus { background: #0b132b; color: white; outline: none; border-color: #4361ee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar-left">
        <div class="brand-header"><i class="fa-solid fa-brain"></i> N.I.K.I. CORE</div>
        <small class="text-muted mb-2">ПРОЕКТИ (WORKSPACES)</small>
        <ul class="ws-list" id="workspaceList"></ul>
        <button class="btn btn-outline-primary btn-sm w-100 mt-2" onclick="createNewWorkspace()"><i class="fa-solid fa-plus"></i> Нов Проект</button>
        
        <hr class="border-secondary my-3">
        <small class="text-muted mb-2">КАЧВАНЕ НА ДОКУМЕНТ</small>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="file" class="form-control form-control-sm mb-2" accept=".txt,.pdf,.docx">
            <button type="submit" class="btn btn-success btn-sm w-100"><i class="fa-solid fa-cloud-arrow-up"></i> Синхронизирай</button>
        </form>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <div>Активно пространство: <strong id="currentWsDisplay" class="text-info">GENERAL</strong></div>
            <span class="badge bg-success">ROOT Access Active</span>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input" placeholder="Въведете инструкция към N.I.K.I..." onkeypress="handleKeyPress(event)">
            <button class="btn btn-primary" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i> Изпрати</button>
        </div>
    </div>

    <div class="sidebar-right">
        <div class="panel-card">
            <div class="panel-title"><i class="fa-solid fa-sun"></i> ЗАПИСАНИ ФАКТИ (+100)</div>
            <ul class="panel-list" id="factsList"><li>Няма регистрирани факти.</li></ul>
        </div>

        <div class="panel-card">
            <div class="panel-title"><i class="fa-solid fa-list-check"></i> АКТИВНИ ЗАДАЧИ</div>
            <ul class="panel-list" id="tasksList"><li>Няма активни задачи.</li></ul>
        </div>

        <div class="panel-card">
            <div class="panel-title"><i class="fa-solid fa-folder-open"></i> ФАЙЛОВЕ В БИБЛИОТЕКАТА</div>
            <ul class="panel-list" id="filesList"><li>Няма качени файлове.</li></ul>
        </div>
    </div>
</div>

<script>
    let activeWorkspace = "general";

    async function loadWorkspaces() {
        const res = await fetch("/workspaces");
        const data = await res.json();
        const list = document.getElementById("workspaceList");
        list.innerHTML = "";
        data.workspaces.forEach(ws => {
            const li = document.createElement("li");
            li.className = `ws-item ${ws === activeWorkspace ? 'active' : ''}`;
            li.innerText = ws.toUpperCase();
            li.onclick = () => switchWorkspace(ws);
            list.appendChild(li);
        });
    }

    async function switchWorkspace(ws) {
        activeWorkspace = ws;
        document.getElementById("currentWsDisplay").innerText = ws.toUpperCase();
        loadWorkspaces();
        loadWorkspaceData();
    }

    async function loadWorkspaceData() {
        const res = await fetch(`/workspace_data/${activeWorkspace}`);
        const data = await res.json();

        const factsList = document.getElementById("factsList");
        factsList.innerHTML = data.facts.length ? data.facts.map(f => `<li class="mb-1">• ${f.content}</li>`).join('') : '<li>Няма регистрирани факти.</li>';

        const tasksList = document.getElementById("tasksList");
        const pending = data.tasks.filter(t => t.status === "PENDING");
        tasksList.innerHTML = pending.length ? pending.map(t => `<li class="mb-1">• ${t.task}</li>`).join('') : '<li>Няма активни задачи.</li>';

        const filesList = document.getElementById("filesList");
        filesList.innerHTML = data.files.length ? data.files.map(f => 
            `<li class="d-flex justify-content-between align-items-center mb-1">
                <span class="text-truncate" style="max-width: 210px;" title="${f}">📄 ${f}</span>
                <i class="fa-solid fa-trash text-danger ms-2" style="cursor:pointer;" title="Изтрий файл" onclick="deleteFile('${f}')"></i>
            </li>`
        ).join('') : '<li>Няма качени файлове.</li>';
    }

    async function deleteFile(filename) {
        if (!confirm(`Сигурни ли сте, че искате да изтриете '${filename}'?`)) return;
        
        const res = await fetch("/delete_file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ workspace: activeWorkspace, filename: filename })
        });
        const data = await res.json();
        alert(data.message);
        loadWorkspaceData();
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const msg = input.value.trim();
        if (!msg) return;

        appendMessage("user", msg);
        input.value = "";

        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg, workspace: activeWorkspace })
        });
        const data = await res.json();

        if (data.target_workspace && data.target_workspace !== activeWorkspace) {
            switchWorkspace(data.target_workspace);
        }

        appendMessage("bot", data.reply, data.monologue);
        loadWorkspaceData();
    }

    function appendMessage(role, text, monologue = null) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = `msg-bubble ${role === 'user' ? 'user-msg' : 'bot-msg'}`;

        let html = "";
        if (monologue) {
            html += `
                <details class="thought-container">
                    <summary class="thought-summary"><i class="fa-solid fa-microchip"></i> Мисловен процес (Кликни за преглед +)</summary>
                    <div class="thought-content">${monologue}</div>
                </details>
            `;
        }
        html += `<div>${text}</div>`;
        div.innerHTML = html;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById("uploadForm").onsubmit = async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById("fileInput");
        if (!fileInput.files.length) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("workspace", activeWorkspace);

        appendMessage("bot", "⏳ Обработвам и анализирам файла автономно...");

        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();

        appendMessage("bot", data.message);
        fileInput.value = "";
        loadWorkspaceData();
    };

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    async function createNewWorkspace() {
        const name = prompt("Име на нов проект:");
        if (name) {
            await fetch("/workspaces", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name })
            });
            switchWorkspace(name);
        }
    }

    loadWorkspaces();
    loadWorkspaceData();
</script>

</body>
</html>
